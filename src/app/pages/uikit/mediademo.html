
        <div class="card">
            <div class="font-semibold text-xl mb-4">Carousel</div>
            <p-carousel [value]="products" [numVisible]="3" [numScroll]="3" [circular]="false" [responsiveOptions]="carouselResponsiveOptions">
                <ng-template let-product #item>
                    <div class="border border-surface rounded-border m-2 p-4">
                        <div class="mb-4">
                            <div class="relative mx-auto">
                                <img src="https://primefaces.org/cdn/primeng/images/demo/product/{{ product.image }}" [alt]="product.name" class="w-full rounded-border" />
                                <div class="absolute bg-black/70 rounded-border" [ngStyle]="{ 'left.px': 5, 'top.px': 5 }">
                                    <p-tag [value]="product.inventoryStatus" [severity]="getSeverity(product.inventoryStatus)" />
                                </div>
                            </div>
                        </div>
                        <div class="mb-4 font-medium">{{ product.name }}</div>
                        <div class="flex justify-between items-center">
                            <div class="mt-0 font-semibold text-xl">{{ '$' + product.price }}</div>
                            <span>
                                <p-button icon="pi pi-heart" severity="secondary" [outlined]="true" />
                                <p-button icon="pi pi-shopping-cart" styleClass="ml-2" />
                            </span>
                        </div>
                    </div>
                </ng-template>
            </p-carousel>
        </div>
        <div class="grid grid-cols-2 grid-rows-1 gap-4">
            <div class="card flex col-lg-2">
                <p-imagecompare class="shadow-lg rounded-2xl">
                    <ng-template #left>
                        <img src="https://primefaces.org/cdn/primevue/images/compare/island1.jpg" alt="Island before" />
                    </ng-template>
                    <ng-template #right>
                        <img src="https://primefaces.org/cdn/primevue/images/compare/island2.jpg" alt="Island after" />
                    </ng-template>
                </p-imagecompare>
            </div>

            <div class="card col-lg-2 ">
                <div class="font-semibold text-xl mb-4">Galleria</div>
                <p-galleria [value]="images" [responsiveOptions]="galleriaResponsiveOptions" [containerStyle]="{ 'max-width': '640px' }" [numVisible]="5">
                    <ng-template #item let-item>
                        <img [src]="item.itemImageSrc" [alt]="item.title" style="width:100%" />
                    </ng-template>
                    <ng-template #thumbnail let-item>
                        <img [src]="item.thumbnailImageSrc" [alt]="item.title" />
                    </ng-template>
                </p-galleria>
            </div>
        </div>
